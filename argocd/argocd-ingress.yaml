# ArgoCD UI를 외부 인터넷에 노출하기 위한 Ingress.
# ALB Controller가 scheme=internet-facing annotation을 보고 공용 ALB를 프로비저닝한다.
# 기존 ticketing internal ALB와는 별도 ALB가 생성됨.
#
# ArgoCD server는 helm values에서 server.insecure=true로 설정돼 80 포트로 HTTP를 서빙하므로
# TLS 종단 없이 그대로 HTTP로 연결한다. HTTPS로 업그레이드하려면 ACM 인증서 ARN을
# alb.ingress.kubernetes.io/certificate-arn 에 지정하고 listen-ports를 443으로 확장.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
