name: Test, Build & Publish

# GitOps 파이프라인:
#   test → docker build → ECR push → kustomize image tag commit
# 배포 자체는 ArgoCD가 git을 watch해서 자동 sync 처리.

on:
  push:
    branches: [FINAL]
    paths-ignore:
      - 'k8s/**'           # 매니페스트 commit으로 무한 루프 방지
      - '**.md'
      - 'argocd/**'
      - 'scripts/**'
  workflow_dispatch:

env:
  AWS_REGION:   ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com

permissions:
  id-token: write
  contents: write   # k8s/kustomization.yaml commit 위해 필요

jobs:
  # ── 변경 감지 ────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      ticketing-was: ${{ steps.filter.outputs.ticketing-was }}
      worker-svc:    ${{ steps.filter.outputs.worker-svc }}
      frontend:      ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ticketing-was: ['services/ticketing-was/**']
            worker-svc:    ['services/worker-svc/**']
            frontend:      ['frontend/**']

  # ── 단위 테스트 ──────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: ticketing-was
            path: services/ticketing-was
          - service: worker-svc
            path: services/worker-svc
    steps:
      - uses: actions/checkout@v4

      - name: 변경 여부 확인
        id: check
        run: |
          case "${{ matrix.service }}" in
            ticketing-was) CHANGED="${{ needs.changes.outputs.ticketing-was }}" ;;
            worker-svc)    CHANGED="${{ needs.changes.outputs.worker-svc }}" ;;
          esac
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Python 셋업
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.path }}/requirements-dev.txt

      - name: 의존성 설치
        if: steps.check.outputs.changed == 'true'
        working-directory: ${{ matrix.path }}
        run: pip install -r requirements-dev.txt

      - name: pytest
        if: steps.check.outputs.changed == 'true'
        working-directory: ${{ matrix.path }}
        run: pytest -v tests/

  # ── 빌드 + ECR push + 매니페스트 갱신 ────────────────────────────
  build-and-publish:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      needs.changes.outputs.ticketing-was == 'true' ||
      needs.changes.outputs.worker-svc    == 'true' ||
      needs.changes.outputs.frontend      == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: FINAL
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: AWS 자격증명
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: kustomize 설치
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      # ticketing-was 이미지 → read-api + write-api 양쪽 Deployment에 사용
      - name: ticketing-was 빌드 & push
        if: needs.changes.outputs.ticketing-was == 'true'
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/ticketing/ticketing-was
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest services/ticketing-was
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          cd k8s
          kustomize edit set image ticketing/ticketing-was=$IMAGE:${{ github.sha }}

      - name: worker-svc 빌드 & push
        if: needs.changes.outputs.worker-svc == 'true'
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/ticketing/worker-svc
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest services/worker-svc
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
          cd k8s
          kustomize edit set image ticketing/worker-svc=$IMAGE:${{ github.sha }}

      - name: frontend 빌드 & push
        if: needs.changes.outputs.frontend == 'true'
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/ticketing/frontend
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest frontend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: 매니페스트 commit & push
        run: |
          if git diff --quiet k8s/; then
            echo "매니페스트 변경 없음 — commit 생략"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git commit -m "ci: image tag → ${{ github.sha }}"
          git push origin FINAL
