# HPA 대상. stable(write-api) 1대는 ticketing-priority-write-api-stable(선점), 추가분만 여기(선점 없음).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: write-api-burst
  namespace: ticketing
  labels:
    app: write-api
    pool: burst
spec:
  # Resource metric(HPA)는 0→1 scale-up을 못 함(파드 메트릭이 없어서). 1개는 항상 떠 있게 둔다.
  replicas: 1
  selector:
    matchLabels:
      app: write-api
      pool: burst
  template:
    metadata:
      labels:
        app: write-api
        pool: burst
    spec:
      enableServiceLinks: false
      priorityClassName: ticketing-priority-write-api-burst
      serviceAccountName: sqs-access-sa
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: write-api
      containers:
        - name: write-api
          image: ticketing/ticketing-was:latest
          imagePullPolicy: Always
          # burst: 단일 이벤트루프에 커넥션/WR 폭주가 몰리면 health까지 지연되어 probe 재시작 루프가 난다.
          # workers로 프로세스를 나누고 backlog를 키워 accept/health 안정성을 우선한다.
          command:
            [
              "uvicorn",
              "write_app:app",
              "--host",
              "0.0.0.0",
              "--port",
              "5001",
              "--workers",
              "2",
              "--backlog",
              "8192",
              "--timeout-keep-alive",
              "5",
            ]
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: ticketing-config
            - secretRef:
                name: ticketing-secrets
          env:
            - name: CONCERT_FIFO_SHARDS
              value: "64"
          resources:
            requests:
              memory: "768Mi"
              cpu: "1000m"
            limits:
              memory: "1536Mi"
              cpu: "2000m"
          startupProbe:
            httpGet:
              path: /api/write/health
              port: 5001
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 180
          livenessProbe:
            httpGet:
              path: /api/write/health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /api/write/health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 30
