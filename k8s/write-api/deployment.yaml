apiVersion: apps/v1
kind: Deployment
metadata:
  name: write-api
  labels:
    app: write-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: write-api
  template:
    metadata:
      labels:
        app: write-api
    spec:
      # READ_API_PORT / WRITE_API_PORT 가 K8s 자동 주입 변수와 이름 충돌하지 않도록 끔.
      enableServiceLinks: false
      serviceAccountName: sqs-access-sa
      containers:
        - name: write-api
          image: ticketing/ticketing-was:latest
          imagePullPolicy: Always
          command: ["uvicorn", "write_app:app", "--host", "0.0.0.0", "--port", "5001"]
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: ticketing-config
            - secretRef:
                name: ticketing-secrets
          env:
            # 콘서트 FIFO 샤딩(회차 내부 병렬성). configmap 기본값을 명시적으로 고정해 데모/운영 일관성 확보.
            - name: CONCERT_FIFO_SHARDS
              value: "64"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          # 기동 시 remain_count 동기화(wait+update)가 붙을 수 있으므로, liveness/readiness보다 먼저 startupProbe로 보호
          startupProbe:
            httpGet:
              path: /api/write/health
              port: 5001
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /api/write/health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/write/health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
