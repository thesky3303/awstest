# HPA 대상(Secondary burst lane). 예비 AZ에 소량 배치(기본 0).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: write-api-burst-secondary
  namespace: ticketing
  labels:
    app: write-api
    pool: burst
    burst-zone: secondary
spec:
  replicas: 0
  selector:
    matchLabels:
      app: write-api
      pool: burst
      burst-zone: secondary
  template:
    metadata:
      labels:
        app: write-api
        pool: burst
        burst-zone: secondary
    spec:
      enableServiceLinks: false
      priorityClassName: ticketing-priority-write-api-burst
      serviceAccountName: sqs-access-sa
      nodeSelector:
        workload: ticketing-burst
        burst-zone: secondary
      tolerations:
        - key: workload
          operator: Equal
          value: ticketing-burst
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: write-api
              pool: burst
              burst-zone: secondary
      containers:
        - name: write-api
          image: ticketing/ticketing-was:latest
          imagePullPolicy: Always
          command:
            [
              "uvicorn",
              "write_app:app",
              "--host",
              "0.0.0.0",
              "--port",
              "5001",
              "--workers",
              "2",
              "--backlog",
              "8192",
              "--timeout-keep-alive",
              "5",
            ]
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: ticketing-config
            - secretRef:
                name: ticketing-secrets
          env:
            - name: CONCERT_FIFO_SHARDS
              value: "64"
          resources:
            requests:
              memory: "768Mi"
              cpu: "1000m"
            limits:
              memory: "1536Mi"
              cpu: "2000m"
          startupProbe:
            httpGet:
              path: /api/write/health
              port: 5001
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 180
          livenessProbe:
            httpGet:
              path: /api/write/health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /api/write/health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 30
