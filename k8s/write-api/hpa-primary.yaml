apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: write-api-burst-primary-hpa
  namespace: ticketing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: write-api-burst-primary
  # Resource(CPU/memory) 메트릭만 쓰는 HPA는 이 클러스터에서 minReplicas<1 및 scale-to-zero 가 불가하다.
  # (Object/External 메트릭 없이 min=0 은 API 거절)
  minReplicas: 1
  maxReplicas: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 45
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 8
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 90
