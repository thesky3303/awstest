apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: write-api-burst-primary-hpa
  namespace: ticketing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: write-api-burst-primary
  # 평시 0으로 두고, 이벤트 전 웜업으로 replicas 를 올리는 운영을 기본으로 한다.
  minReplicas: 0
  maxReplicas: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 45
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 65
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 8
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 90
