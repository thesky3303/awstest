apiVersion: v1
kind: ServiceAccount
metadata:
  name: sqs-access-sa
  namespace: ticketing
  annotations:
    # IRSA role arn. setup-all.sh [9.5/14] 가 PLACEHOLDER_ACCOUNT_ID 를 본인 AWS 계정 ID 로
    # 로컬 치환한 뒤 kubectl apply 한다. ArgoCD Application(argocd/application.yaml) 의
    # ignoreDifferences 에는 sqs-access-sa 가 없음 — IRSA 는 Terraform/부트스트랩이 단일 진실.
    # role 이름은 eks 모듈의 ${local.name_prefix}-sqs-access-role = `ticketing-eks-sqs-access-role`.
    eks.amazonaws.com/role-arn: "arn:aws:iam::538118265080:role/ticketing-eks-sqs-access-role"
