apiVersion: v1
kind: ServiceAccount
metadata:
  name: sqs-access-sa
  namespace: ticketing
  annotations:
    # IRSA role arn. setup-all.sh [9.5/14] 가 734772058616 를 본인 AWS 계정 ID 로
    # 로컬 치환한 뒤 kubectl apply 한다. ArgoCD 는 argocd/application.yaml 의
    # ignoreDifferences 로 이 annotation 을 무시하므로 selfHeal 로 덮지 않는다.
    # role 이름은 eks 모듈의 ${local.name_prefix}-sqs-access-role = `ticketing-eks-sqs-access-role`.
    eks.amazonaws.com/role-arn: "arn:aws:iam::734772058616:role/ticketing-eks-sqs-access-role"
