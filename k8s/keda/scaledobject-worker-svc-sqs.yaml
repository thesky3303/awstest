apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-svc-sqs
  labels:
    app: worker-svc
  annotations:
    # 기본은 스케일 "비활성"(필요 시 scripts/worker-autoscale-on.sh 로 paused- 해제).
    autoscaling.keda.sh/paused: "true"
spec:
  scaleTargetRef:
    name: worker-svc-burst
  # scale-out 은 유지, scale-in 은 너무 빠르면 워커·노드가 동시에 빠졌다가 큐 재적체 시 Pending 반복
  pollingInterval: 2
  cooldownPeriod: 180
  # stable worker-svc 1대는 ScaledObject 밖. burst 만 0~39 (합계 최대 40).
  minReplicaCount: 0
  maxReplicaCount: 39
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
            - type: Pods
              value: 10
              periodSeconds: 30
          selectPolicy: Max
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: keda-worker-sqs-aws
      metadata:
        awsRegion: ap-northeast-2
        # scale target(worker-svc)의 env로부터 큐 URL을 읽음(환경별/계정별 URL 차이를 안전하게 흡수)
        queueURLFromEnv: SQS_QUEUE_URL
        # 1메시지부터 즉시 확장(데모/버스트에서 반응성 극대화)
        queueLength: "1"
        activationQueueLength: "0"
        scaleOnInFlight: "true"
