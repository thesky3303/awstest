apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketing-ingress
  namespace: ticketing
  annotations:
    # API GW VPC Link (private subnet) 가 올바르게 접근하려면 Internal ALB 필수.
    # internet-facing ALB 는 VPC 내부에서 split-horizon DNS 로 private IP 해석되지 않아
    # VPC Link 에서 9s timeout → 503. 외부 노출은 CloudFront + API GW 가 담당.
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    # Internal ALB 는 VPC 외부에서 접근 불가. VPC 내부(VPC Link / Pod / bastion)
    # 모두 허용하도록 VPC CIDR 로 열어둔다. 없으면 ALB SG inbound 가 비어 있어
    # VPC Link → ALB 트래픽이 차단(9s timeout → API GW 503).
    alb.ingress.kubernetes.io/inbound-cidrs: "10.0.0.0/16"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          # Read API
          - path: /api/read
            pathType: Prefix
            backend:
              service:
                name: read-api
                port:
                  number: 5000
          # Write API
          - path: /api/write
            pathType: Prefix
            backend:
              service:
                name: write-api
                port:
                  number: 5001
          # Health check
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: read-api
                port:
                  number: 5000
          # ALB 기본 503( CORS 없음 ) 방지: 잘못된 루트 요청·프리로드 등이 /?query 로 들어와도 read-api가 응답하도록
          - path: /
            pathType: Prefix
            backend:
              service:
                name: read-api
                port:
                  number: 5000
