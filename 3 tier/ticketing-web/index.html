<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sol ticketing</title>
    <link rel="icon" href="data:," />

    <script defer src="/js/common/read-api.js"></script>
    <script defer src="/js/common/write-api.js"></script>
    <script defer src="/js/common/app-config.js"></script>
    <script defer src="/js/common/image-resolver.js"></script>
    <script defer src="/js/main/head.js"></script>
    <script defer src="/js/user/login.js"></script>
    <script defer src="/js/main/router.js"></script>
  </head>

  <body>
    <div id="site-header"></div>
    <div id="main-body"></div>

    <div style="position: fixed; top: 10px; left: 10px; z-index: 99999;">
      <button id="flush-redis-btn" type="button">Redis 초기화</button>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const button = document.getElementById('flush-redis-btn');
        if (!button) return;

        button.addEventListener('click', async function () {
          try {
            // writeApi는 내부적으로 '/api/write' prefix를 붙입니다.
            const data = await writeApi('/admin/cache/rebuild-all', 'POST', null, { cache: 'no-store' });
            console.log('cache rebuild result:', data);
            if (window.APP_RUNTIME && typeof window.APP_RUNTIME.notifyReadCacheRebuilt === 'function') {
              window.APP_RUNTIME.notifyReadCacheRebuilt();
            }
            alert(data.message || 'Redis 초기화가 완료되었습니다.');
          } catch (error) {
            console.error(error);
            const status = error && typeof error === 'object' ? error.status : null;
            const message = error && typeof error === 'object' ? error.message : '';
            const hint = status ? ` (HTTP ${status})` : '';
            alert((message || 'Redis 초기화 중 오류가 발생했습니다.') + hint);
          }
        });
      });
    </script>
  </body>
</html>
