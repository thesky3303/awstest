global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait:      10s
  group_interval:  5m
  repeat_interval: 1h
  receiver: 'slack'

  routes:
    - match:
        severity: critical
      receiver: 'slack'
      repeat_interval: 15m

receivers:
  - name: 'slack'
    slack_configs:
      - api_url: 'SLACK_WEBHOOK_PLACEHOLDER'
        send_resolved: true
        channel: '#alerts'
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *심각도*: {{ .Labels.severity }}
          *요약*: {{ .Annotations.summary }}
          *시작*: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          ---
          {{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
