global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: 'prod'
    region: 'ap-northeast-2'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  # ① EC2 자체 메트릭
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    labels:
      instance: 'monitoring-ec2'

  # ② AWS 서비스 메트릭 (RDS, SQS, ElastiCache)
  - job_name: 'cloudwatch-exporter'
    static_configs:
      - targets: ['cloudwatch-exporter:9106']
    scrape_interval: 60s  # CloudWatch API 호출 최소화

  # ③ Redis 메트릭
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ④ EKS 내 서비스 메트릭
  #    배포 시 EKS_ALB_DNS 환경변수를 설정한 뒤 envsubst로 치환하세요:
  #    export EKS_ALB_DNS=$(kubectl get ingress -n ticketing -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
  #    envsubst < prometheus.yml.tpl > prometheus.yml
  - job_name: 'event-svc'
    static_configs:
      - targets: ['${EKS_ALB_DNS}:80']
    metrics_path: /metrics
    honor_labels: true

  - job_name: 'reserv-svc'
    static_configs:
      - targets: ['${EKS_ALB_DNS}:80']
    metrics_path: /reserv-metrics
    honor_labels: true

  - job_name: 'worker-svc'
    static_configs:
      - targets: ['${EKS_ALB_DNS}:80']
    metrics_path: /worker-metrics
    honor_labels: true

  # ⑤ Prometheus 자체 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
